<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>AR Menu Experience</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <!-- AR.js A-Frame bridge for Markerless camera -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <!-- Tailwind CSS (via CDN for standalone HTML) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            width: 100%; 
            height: 100%;
            background-color: #0d0d0d; 
            position: fixed;
        }
        
        /* Force AR video and canvas to cover the whole screen beautifully */
        .mindar-ui-overlay { display: none !important; }
        
        .glass-ui {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* MindAR UI elements overriding */
        #example-scanning-overlay {
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            left: 0;
            right: 0;
            top: 0;
            bottom: 0;
            background: transparent;
            z-index: 2;
        }
        @media (min-aspect-ratio: 1/1) {
            #example-scanning-overlay .inner {
                width: 50vh;
                height: 50vh;
            }
        }
        @media (max-aspect-ratio: 1/1) {
            #example-scanning-overlay .inner {
                width: 80vw;
                height: 80vw;
            }
        }
        #example-scanning-overlay .inner {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: linear-gradient(to right, white 10px, transparent 10px) 0 0,
            linear-gradient(to right, white 10px, transparent 10px) 0 100%,
            linear-gradient(to left, white 10px, transparent 10px) 100% 0,
            linear-gradient(to left, white 10px, transparent 10px) 100% 100%,
            linear-gradient(to bottom, white 10px, transparent 10px) 0 0,
            linear-gradient(to bottom, white 10px, transparent 10px) 100% 0,
            linear-gradient(to top, white 10px, transparent 10px) 0 100%,
            linear-gradient(to top, white 10px, transparent 10px) 100% 100%;
            background-repeat: no-repeat;
            background-size: 40px 40px;
        }

        #example-scanning-overlay.hidden {
            display: none;
        }

        /* Pure camera fullscreen mapping */
        #arjs-video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            z-index: -1 !important;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- AR Scene (Markerless Gyroscope Mode) -->
    <a-scene 
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;"
        renderer="antialias: true; alpha: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false">
        
        <!-- Dynamic Lights -->
        <a-light type="ambient" color="#ffffff" intensity="1.5"></a-light>
        <a-light type="directional" position="0.5 1 1" intensity="1"></a-light>
        
        <!-- Magic Markerless Object Placement -->
        <!-- It spawns exactly 2 meters straight ahead of the camera the instant it loads! -->
        <!-- Because they are looking at the QR code, it spawns ON the QR code! -->
        <a-entity 
            position="0 -0.5 -3" 
            gltf-model="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb" 
            scale="10 10 10" 
            rotation="0 0 0"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            <!-- Add a soft digital shadow shadow -->
            <a-circle radius="1" rotation="-90 0 0" position="0 -0.05 0" color="#f59e0b" opacity="0.4"></a-circle>
        </a-entity>

        <!-- Camera anchored to the phone's gyroscope -->
        <a-camera position="0 0 0" look-controls="enabled: false" rotation-reader></a-camera>
    </a-scene>

</body>
</html>
